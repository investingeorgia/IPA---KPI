<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>IPA KPI Hub — Enterprise Georgia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
<style>
  html, body { margin:0; padding:0; height:100%; background: var(--cream); }
  #root { width:100%; height:100vh; }
  /* Print: only the report sheet */
  @media print {
    body * { visibility: hidden; }
    #report-sheet, #report-sheet * { visibility: visible; }
    #report-sheet { position: absolute; left:0; top:0; width:100%; border:none !important; box-shadow:none !important; border-radius:0 !important; }
    @page { margin: 16mm; }
  }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0B3D2E"/>
    <circle cx="50" cy="40" r="15" fill="none" stroke="#DCE9E2" stroke-width="4"/>
    <circle cx="50" cy="40" r="6.5" fill="none" stroke="#DCE9E2" stroke-width="4"/>
    <circle cx="50" cy="40" r="1.5" fill="#DCE9E2"/>
    <rect x="30" y="64" width="40" height="5" rx="2.5" fill="#3E8367"/>
    <rect x="30" y="64" width="26" height="5" rx="2.5" fill="#DCE9E2"/>
    <rect x="30" y="74" width="40" height="5" rx="2.5" fill="#1F5A45"/>
    <rect x="30" y="74" width="15" height="5" rx="2.5" fill="#DCE9E2"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="hub-data.jsx"></script>
<script type="text/babel" src="hub-shell.jsx"></script>
<script type="text/babel" src="hub-dashboard.jsx"></script>
<script type="text/babel" src="hub-kpis.jsx"></script>
<script type="text/babel" src="hub-kpi-detail.jsx"></script>
<script type="text/babel" src="hub-todos.jsx"></script>
<script type="text/babel" src="hub-team.jsx"></script>
<script type="text/babel" src="hub-database.jsx"></script>
<script type="text/babel" src="hub-reports.jsx"></script>

<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById('root')).render(
  <window.StoreProvider><window.AppShell/></window.StoreProvider>
);
</script>
</body>
</html>
